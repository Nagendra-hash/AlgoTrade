# Path: docker-compose.yml
version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tradeai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     trader
      POSTGRES_PASSWORD: trader123
      POSTGRES_DB:       tradeai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d tradeai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradeai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradeai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:      postgresql+asyncpg://trader:trader123@postgres:5432/tradeai
      DATABASE_SYNC_URL: postgresql://trader:trader123@postgres:5432/tradeai
      REDIS_URL:         redis://redis:6379
      DEBUG:             "true"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradeai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
